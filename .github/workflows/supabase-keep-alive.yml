name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:               # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Query Supabase to prevent inactivity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
          const https = require('https');
          const url = new URL(process.env.SUPABASE_URL);
          const options = {
            hostname: url.hostname,
            path: '/rest/v1/PLAYERS?limit=1',
            method: 'GET',
            headers: {
              'apikey': process.env.SUPABASE_KEY,
              'Authorization': 'Bearer ' + process.env.SUPABASE_KEY,
              'Content-Type': 'application/json'
            }
          };
          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              console.log('Status:', res.statusCode);
              console.log('Response:', data);
              if (res.statusCode < 500) {
                console.log('Success — Supabase is alive!');
                process.exit(0);
              } else {
                console.error('Error — unexpected status code');
                process.exit(1);
              }
            });
          });
          req.on('error', (e) => {
            console.error('Request failed:', e.message);
            process.exit(1);
          });
          req.end();
          "
